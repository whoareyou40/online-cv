career-profile: 
    title: 职业生涯简介
    text: '拥有超过 12 年的软件开发经验以及超过10年GIS系统开发经验，尤其擅长基于 JavaEE 技术的开发。
    他在前台（浏览器端）和后台（服务器端）开发技术方面经验丰富，同时对数据库开发也非常熟悉。 从数据库开发到网络开发，均有能力为客户提供全面的技术解决方案。曾为香港特区政府部门，如环境保护署、路政署、渠务署和香港房屋委员会提供技术支持和咨询服务。拥有带领团队协调工作完成项目的成功经验。主要负责文档编写，系统分析，系统框架设计及核心功能的开发。现在致力于研究移动端GIS在各行业的使用，以解决移动定位，移动办公等越来越迫切的需求。'


